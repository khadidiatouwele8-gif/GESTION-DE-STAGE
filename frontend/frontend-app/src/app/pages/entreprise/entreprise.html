<app-navbar />

<div style="max-width:900px; margin:0 auto; padding:2rem 1.5rem; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; align-items:start;">

  <div>
    <h2 style="font-size:1rem; font-weight:700; color:var(--navy); margin-bottom:1rem;">Publier une offre</h2>
    <div class="card" style="padding:1.5rem;">
      <form (ngSubmit)="creerOffre()">
        <div class="form-group">
          <label>Titre</label>
          <input type="text" [(ngModel)]="offre.titre" name="titre" placeholder="Ex: Développeur Web" required />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea [(ngModel)]="offre.description" name="description" rows="3" placeholder="Décrivez le stage..."></textarea>
        </div>
        <div class="form-group">
          <label>Domaine</label>
          <input type="text" [(ngModel)]="offre.domaine" name="domaine" placeholder="Ex: Informatique" required />
        </div>
        <div class="form-group">
          <label>Localisation</label>
          <input type="text" [(ngModel)]="offre.localisation" name="localisation" placeholder="Ex: Dakar" required />
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
          <div class="form-group">
            <label>Durée (mois)</label>
            <input type="number" [(ngModel)]="offre.duree_mois" name="duree_mois" required />
          </div>
          <div class="form-group">
            <label>Expiration</label>
            <input type="date" [(ngModel)]="offre.date_expiration" name="date_expiration" required />
          </div>
        </div>
        <div class="alert-success" *ngIf="success">{{ success }}</div>
        <div class="alert-error" *ngIf="error">{{ error }}</div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:1rem; border-radius:6px;">
          Publier l'offre
        </button>
      </form>
    </div>
  </div>

  <div>
    <h2 style="font-size:1rem; font-weight:700; color:var(--navy); margin-bottom:1rem;">Offres publiées ({{ offres.length }})</h2>
    <div *ngIf="offres.length === 0" class="card" style="text-align:center; padding:2rem; color:var(--text-muted); font-size:0.88rem;">
      Aucune offre publiée.
    </div>
    <div *ngFor="let o of offres" class="card" style="margin-bottom:0.75rem; padding:1.1rem 1.25rem;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem;">
        <div>
          <span class="tag" style="margin-bottom:5px; display:inline-block;">{{ o.domaine }}</span>
          <p style="font-weight:700; font-size:0.92rem; color:var(--navy);">{{ o.titre }}</p>
          <p style="font-size:0.8rem; color:var(--text-muted);">{{ o.localisation }} • {{ o.duree_mois }} mois</p>
        </div>
        <button (click)="supprimerOffre(o.id)" class="btn btn-danger" style="flex-shrink:0; padding:0.35rem 0.75rem; font-size:0.8rem; border-radius:6px;">
          Supprimer
        </button>
      </div>
    </div>
  </div>
</div>
