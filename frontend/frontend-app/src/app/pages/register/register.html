<<div class="page-login">
  <div class="card">
    <h1>Créer un compte</h1>
    <p>Rejoignez la plateforme de gestion de stage</p>

    <form (ngSubmit)="submit()">
      <label>Nom complet</label>
      <input type="text" [(ngModel)]="name" name="name" required />

      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required />

      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" name="password" required />

      <label>Confirmer le mot de passe</label>
      <input type="password" [(ngModel)]="password_confirmation" name="password_confirmation" required />

      <button type="submit" style="margin-top:1rem">Créer mon compte</button>
      <p style="color:red" *ngIf="error">{{ error }}</p>
      <p style="color:green" *ngIf="success">{{ success }}</p>
    </form>

    <div style="margin-top:1rem; text-align:center">
      <span>Déjà un compte ? </span>
      <a routerLink="/login">Se connecter</a>
    </div>
  </div>
</div>
