<div style="min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:1.5rem;">
  <div style="width:100%; max-width:460px;">

    <div style="text-align:center; margin-bottom:2rem;">
      <h1 style="font-size:1.5rem; font-weight:700; color:var(--navy);">Créer un compte</h1>
      <p style="color:var(--text-muted); margin-top:4px; font-size:0.9rem;">Rejoignez la plateforme StageLink</p>
    </div>

    <div class="card" style="padding:2rem;">
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label>Nom complet</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="Prénom Nom" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="vous@exemple.com" required />
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Min. 8 caractères" required />
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe</label>
          <input type="password" [(ngModel)]="password_confirmation" name="password_confirmation" placeholder="••••••••" required />
        </div>

        <div class="alert-error" *ngIf="error">{{ error }}</div>
        <div class="alert-success" *ngIf="success">{{ success }}</div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.25rem;">
          Créer mon compte
        </button>
      </form>

      <div class="divider"></div>

      <p style="text-align:center; font-size:0.88rem; color:var(--text-muted);">
        Déjà un compte ?
        <a routerLink="/login" style="font-weight:600;">Se connecter</a>
      </p>
    </div>
  </div>
</div>
