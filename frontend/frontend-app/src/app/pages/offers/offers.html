<div class="page-offers">
  <div style="width:100%; max-width:800px;">
    <div style="margin-bottom:2rem;">
      <h1>Offres de stage</h1>
      <p>Découvrez les meilleures opportunités et postulez en quelques clics.</p>
    </div>

    <div *ngIf="error" style="color:red; margin-bottom:1rem;">{{ error }}</div>
    <div *ngIf="offers.length === 0 && !error" style="text-align:center; padding:2rem;">
      Chargement des offres...
    </div>

    <article class="offer-card" *ngFor="let offer of offers">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="tag">{{ offer.domaine }}</span>
        <span style="font-size:0.85rem; color:#6b7280;">{{ offer.localisation }}</span>
      </div>
      <h2 style="margin: 0.75rem 0 0.5rem;">{{ offer.titre }}</h2>
      <p style="color:#6b7280; margin:0 0 1rem;">{{ offer.description }}</p>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:0.85rem; color:#6b7280;">Durée : {{ offer.duree_mois }} mois</span>
        <button style="width:auto; padding:0.5rem 1.5rem;" (click)="postuler(offer.id)">Postuler</button>
      </div>
    </article>

    <div style="margin-top:2rem;">
      <a routerLink="/dashboard">
        <button style="width:auto; padding:0.75rem 2rem;">Retour au dashboard</button>
      </a>
    </div>
  </div>
</div>
