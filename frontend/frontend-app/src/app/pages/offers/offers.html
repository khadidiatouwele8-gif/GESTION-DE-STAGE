<app-navbar />

<div style="max-width:900px; margin:0 auto; padding:2rem 1.5rem;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
    <div>
      <h1 style="font-size:1.35rem; font-weight:700; color:var(--navy);">Offres de stage</h1>
      <p style="color:var(--text-muted); font-size:0.88rem; margin-top:2px;">{{ offers.length }} offres disponibles</p>
    </div>
    <a routerLink="/dashboard" class="btn btn-outline">← Retour</a>
  </div>

  <div class="alert-error" *ngIf="error">{{ error }}</div>

  <div *ngIf="offers.length === 0 && !error" class="card" style="text-align:center; padding:3rem; color:var(--text-muted);">
    Chargement des offres...
  </div>

  <div *ngFor="let offer of offers" class="card" style="margin-bottom:0.75rem; padding:1.25rem 1.5rem;">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:1rem;">
      <div style="flex:1;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
          <span class="tag">{{ offer.domaine }}</span>
          <span style="font-size:0.8rem; color:var(--text-muted);">{{ offer.localisation }}</span>
          <span style="font-size:0.8rem; color:var(--text-muted);">• {{ offer.duree_mois }} mois</span>
        </div>
        <h2 style="font-size:1rem; font-weight:700; color:var(--navy); margin-bottom:4px;">{{ offer.titre }}</h2>
        <p style="color:var(--text-muted); font-size:0.88rem; line-height:1.5;">{{ offer.description }}</p>
      </div>
      <button (click)="postuler(offer.id)" class="btn btn-primary" style="flex-shrink:0; border-radius:6px;">
        Postuler
      </button>
    </div>
  </div>
</div>
