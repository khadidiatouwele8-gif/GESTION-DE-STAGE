<app-navbar />

<div style="max-width:700px; margin:0 auto; padding:2rem 1.5rem;">
  <div class="card" style="padding:2rem; margin-bottom:1rem;">
    <div style="display:flex; align-items:center; gap:1.25rem; margin-bottom:1.5rem;">
      <div style="width:80px; height:80px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:1.75rem; font-weight:700; flex-shrink:0;">
        {{ (user.name || 'U').charAt(0).toUpperCase() }}
      </div>
      <div>
        <h1 style="font-size:1.25rem; font-weight:700; color:var(--navy);">{{ user.name }}</h1>
        <p style="color:var(--text-muted); font-size:0.88rem;">{{ user.email }}</p>
        <span class="tag" style="margin-top:6px; display:inline-block;">{{ user.role?.nom || 'Étudiant' }}</span>
      </div>
    </div>
    <div class="divider"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div>
        <p style="font-size:0.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em;">Email</p>
        <p style="font-size:0.92rem; color:var(--text); margin-top:3px;">{{ user.email }}</p>
      </div>
      <div>
        <p style="font-size:0.78rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em;">Membre depuis</p>
        <p style="font-size:0.92rem; color:var(--text); margin-top:3px;">{{ user.created_at | date:'mediumDate' }}</p>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:0.75rem;">
    <a routerLink="/dashboard" class="btn btn-outline">← Dashboard</a>
    <button (click)="logout()" class="btn btn-danger">Se déconnecter</button>
  </div>
</div>
